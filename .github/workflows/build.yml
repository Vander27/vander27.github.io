name: Gerar Portfólio

on:
  push:
    paths:
      - 'apps.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gerar index.html
        run: python generate.py

      - name: Commit e Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || (git commit -m "Atualizar portfólio automaticamente" && git push)
